  <!-- Connection arrows -->
  <path d="M 110 190 L 110 210" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 690 190 L 690 210" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,2"/>
  <path d="M 110 330 L 110 350" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="85" y="343" fill="#22c55e" font-size="8" font-weight="600">dispatches</text>
